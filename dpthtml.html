<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title></title>
</head>
<body style="margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5;">
    <canvas id="canvas" style="border: 1px solid #ccc; background: white;"></canvas>
    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const state = {
            dpr: window.devicePixelRatio || 1,
            size: 600,<!--  -->
            point: { x: 300, y: 300 }
        };
        function init() {
            canvas.width = state.size * state.dpr;
            canvas.height = state.size * state.dpr;
            canvas.style.width = `${state.size}px`;
            canvas.style.height = `${state.size}px`;
            ctx.scale(state.dpr, state.dpr);
            render();
        }
        function render() {
            ctx.clearRect(0, 0, state.size, state.size);
            ctx.beginPath();
            ctx.lineWidth = 10;
            ctx.strokeStyle = "#000000";
            ctx.lineCap = "round";
            ctx.moveTo(state.point.x, state.point.y);
            ctx.lineTo(state.point.x, state.point.y);
            ctx.stroke();
            requestAnimationFrame(render);
        }
        init();
    </script>
</body>
</html>
